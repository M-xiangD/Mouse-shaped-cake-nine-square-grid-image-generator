<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鼠饼九宫格图片生成器</title>
    <link rel="icon" type="image/png" href="04_挤成饼了.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 左侧控制区域 -->
        <div class="control-panel">
            <!-- 模式选择 -->
            <div class="section">
                <h2>模式选择</h2>
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="1">模式1：单图分割</button>
                    <button class="mode-btn" data-mode="2">模式2：多图排版</button>
                </div>
            </div>
            
            <!-- 网格布局选择 -->
            <div class="section">
                <h2>网格布局</h2>
                <div class="grid-layout-controls">
                    <div class="control-group">
                        <label for="gridRows">行数：</label>
                        <input type="number" id="gridRows" min="1" max="10" value="3">
                    </div>
                    <div class="control-group">
                        <label for="gridCols">列数：</label>
                        <input type="number" id="gridCols" min="1" max="10" value="3">
                    </div>
                    <div class="control-group">
                        <button class="upload-btn" id="applyGridBtn">应用布局</button>
                    </div>
                </div>
            </div>
            
            <!-- 间距调整 -->
            <div class="section">
                <h2>间距调整</h2>
                <div class="spacing-controls">
                    <div class="control-group">
                        <label for="topSpacing">上边距：</label>
                        <div class="range-container">
                            <input type="range" id="topSpacing" min="0" max="50" value="10">
                            <div class="value-container">
                                <span id="topSpacingValue">10</span>
                                <span>px</span>
                            </div>
                        </div>
                    </div>
                    <div class="control-group">
                        <label for="bottomSpacing">下边距：</label>
                        <div class="range-container">
                            <input type="range" id="bottomSpacing" min="0" max="50" value="10">
                            <div class="value-container">
                                <span id="bottomSpacingValue">10</span>
                                <span>px</span>
                            </div>
                        </div>
                    </div>
                    <div class="control-group">
                        <label for="leftSpacing">左边距：</label>
                        <div class="range-container">
                            <input type="range" id="leftSpacing" min="0" max="50" value="10">
                            <div class="value-container">
                                <span id="leftSpacingValue">10</span>
                                <span>px</span>
                            </div>
                        </div>
                    </div>
                    <div class="control-group">
                        <label for="rightSpacing">右边距：</label>
                        <div class="range-container">
                            <input type="range" id="rightSpacing" min="0" max="50" value="10">
                            <div class="value-container">
                                <span id="rightSpacingValue">10</span>
                                <span>px</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 右侧内容区域 -->
        <div class="content-panel">
            <!-- 标题 -->
            <div class="header">
                <h1>鼠饼九宫格图片生成器</h1>
            </div>
            
            <!-- 图片上传区域 -->
            <div class="section">
                <h2>上传图片</h2>
                <div class="single-upload" id="singleUpload">
                    <div class="upload-container">
                        <div class="upload-btn">
                            <input type="file" id="singleFile" accept="image/*">
                            上传图片
                        </div>
                    </div>
                </div>
                <div class="multiple-upload" id="multipleUpload" style="display: none;">
                    <div class="upload-container">
                        <div class="upload-btn">
                            <input type="file" id="multipleFileInput" accept="image/*" multiple>
                            添加图片
                        </div>
                    </div>
                </div>
            </div>
            
            <!-- 九宫格预览区域 -->
            <div class="section preview-section">
                <h2>预览效果</h2>
                <div class="grid-container" id="gridContainer">
                    <div class="grid-item"></div>
                    <div class="grid-item"></div>
                    <div class="grid-item"></div>
                    <div class="grid-item"></div>
                    <div class="grid-item"></div>
                    <div class="grid-item"></div>
                    <div class="grid-item"></div>
                    <div class="grid-item"></div>
                    <div class="grid-item"></div>
                </div>
            </div>
            
            <!-- 操作按钮 -->
            <div class="action-buttons">
                <button class="action-btn generate-btn" id="generateBtn">生成</button>
                <button class="action-btn download-btn" id="downloadBtn">下载</button>
                <button class="action-btn shuffle-btn" id="shuffleBtn">随机打乱</button>
            </div>
        </div>
    </div>
    
    <!-- 隐藏的Canvas用于生成图片 -->
    <div class="canvas-container">
        <canvas id="outputCanvas"></canvas>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
